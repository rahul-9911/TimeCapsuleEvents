networks:
  snapevent:
    name: snapevent_default

volumes:
  pg_data:
  minio_data:
  efs_data:

services:

  # ── Reverse Proxy (local ALB equivalent) ──────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: snapevent-traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.network=snapevent_default
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --log.level=INFO
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - snapevent
    restart: unless-stopped

  # ── Control Plane ──────────────────────────────────────────────────────────
  control:
    build:
      context: .
      dockerfile: docker/control/Dockerfile
    container_name: snapevent-control
    env_file: .env
    environment:
      ENV: dev
      DOCKER_NETWORK: snapevent_default
      EFS_MOUNT: /efs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # spawns event containers
      - efs_data:/efs                               # local EFS equivalent
      - ./services/control:/app                     # hot reload in dev
      - ./frontend:/frontend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.control.rule=PathPrefix(`/`)"
      - "traefik.http.routers.control.priority=1"
      - "traefik.http.services.control.loadbalancer.server.port=8000"
    networks:
      - snapevent
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── PostgreSQL (local RDS equivalent) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: snapevent-postgres
    environment:
      POSTGRES_DB: snapevent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - snapevent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (local S3 equivalent) ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: snapevent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # MinIO API
      - "9001:9001"   # MinIO console
    volumes:
      - minio_data:/data
    networks:
      - snapevent
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO bucket init ─────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: snapevent-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/snapevent-dev;
        echo 'MinIO bucket ready';
      "
    networks:
      - snapevent
